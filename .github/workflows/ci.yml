name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust:
    name: Rust (fmt · clippy · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: system
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: system
      - name: Formatting
        run: cargo fmt --check
      # Tiger Style gate: warnings (incl. unwrap/expect/panic/todo denies) fail the build.
      - name: Clippy (-D warnings)
        run: cargo clippy --all-targets -- -D warnings
      - name: Tests
        run: cargo test

  python:
    name: Python (compile · pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install test deps
        run: pip install pytest
      - name: Byte-compile pipeline
        run: python -m py_compile pipeline/src/aion_medsafe_pipeline/*.py
      - name: Tests
        run: PYTHONPATH=pipeline/src python -m pytest pipeline/tests -q
